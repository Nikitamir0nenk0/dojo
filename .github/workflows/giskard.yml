name: giskard

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: Malstrom/giskard@main
        with:
          framework: "dojo"
          mode: instance
          github-token: ${{ secrets.GITHUB_TOKEN }}
