# .agent.yml
# AI-only operational manifest for the dojo framework.

# ---------------------------------------------------------------------------
# LANGUAGE
# ---------------------------------------------------------------------------
language:
  chat: read from .gakusei.yml    # language used when speaking with the student
  files: english                  # all file content, commits, PR/issue bodies
  filenames: english              # all file names AND folder names (snake_case, lowercase)

# ---------------------------------------------------------------------------
# WORK RULES
# ---------------------------------------------------------------------------
work_rules:
  branch_per_issue: true
  branch_naming: "{type}/{short-description}"
  all_writes_via_pr: true
  merge_strategy: squash
  level_up: AI proposes, student confirms — never automatic
  densho: does not exist — books consumed live from library sources

# ---------------------------------------------------------------------------
# TOOL APPROVAL
# false = execute immediately, no exceptions — irreversibility is not a reason to ask
# true  = always ask before executing
# ---------------------------------------------------------------------------
tool_approval:
  create_branch: false
  push_files: false
  create_pr: false
  create_issue: false
  create_sub_issue: false
  update_issue: false
  merge_to_main: false
  delete_file: true
  destructive_ops: true

# ---------------------------------------------------------------------------
# STATE MODEL
# ---------------------------------------------------------------------------
# Single source of truth for each piece of information:
#   student identity    → .gakusei.yml (student_name, language, issue_language)
#   active goals        → open goal issues [Goal] — checklist of [ ] / [x] topics
#   topic started       → kata/{topic}.md exists
#   current gaps        → kata/{topic}.md ## Current gaps section
#   session history     → kiroku/nikki/ filenames + content
#   topic passed        → [x] in goal issue + kata link + nikki link
#   goal completed      → goal issue closed + makimono written
#
# .gakusei.yml MUST NOT contain: topics.*, goals.*, last_session.*

# ---------------------------------------------------------------------------
# SCENARIOS
# Read .scenarios.yml BEFORE any reasoning.
# Every user message must be matched against scenarios first.
# ---------------------------------------------------------------------------
scenarios:
  spec: Malstrom/zeroth:frameworks/dojo/.scenarios.yml
  read_before_responding: true
  on_no_match: propose new scenario to user before proceeding

# ---------------------------------------------------------------------------
# WORKSPACE
# ---------------------------------------------------------------------------
workspace:
  .gakusei.yml:
    role: student identity only (student_name, language, issue_language)
    access: read-write
    note: read at every session start — contains NO topic or goal state
  .scenarios.yml:
    role: scenario catalog
    access: read-only
  .registry.yml:
    role: cross-repo connections
    access: read-only
  templates/:
    role: file templates for kata, nikki, makimono, shinsa
    access: read-only
  patterns:
    - path: "kata/**"
      role: flat kata library — one file per topic slug; ## Current gaps section is authoritative for gap state
      access: read-write
    - path: "kiroku/nikki/**"
      role: immutable session logs
      access: append-only
    - path: "kiroku/makimono/**"
      role: immutable certification snapshots — write-once, produced by goal_shinsa on pass
      access: write-once
